<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC Labs | Propelling the Future</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            /* Deep Space Gradient */
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            /* Layered Star Field using multiple Box Shadows */
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 130px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, #ddd, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            background-attachment: fixed;
            color: #ffffff;
            text-align: center; 
            padding: 50px 20px; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* Adding a second layer of smaller, denser stars */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(1px 1px at 10px 10px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 150px 150px, #fff, rgba(0,0,0,0));
            background-size: 100px 100px;
            opacity: 0.3;
            z-index: -1;
        }
        
        .logo-box {
            background: #ffffff;
            display: inline-block;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(78, 204, 163, 0.3);
        }

        .logo { 
            max-width: 180px; 
            display: block; 
        }

        /* Traffic Light Yellow Blinking Badge */
        .status-badge { 
            display: inline-block; 
            color: #FFCC00; 
            font-size: 1.8rem; 
            font-weight: 900; 
            margin-bottom: 35px; 
            letter-spacing: 1px;
            animation: traffic-blink 1.2s infinite; 
        }

        @keyframes traffic-blink {
            0% { opacity: 1; text-shadow: 0 0 15px #FFCC00; }
            50% { opacity: 0.2; text-shadow: none; }
            100% { opacity: 1; text-shadow: 0 0 15px #FFCC00; }
        }

        .hero-title { 
            font-size: 2.6rem; 
            font-weight: 800; 
            letter-spacing: -1px; 
            background: linear-gradient(180deg, #ffffff, #4ecca3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px; 
            line-height: 1.1; 
        }

        .tagline { 
            font-size: 1rem; 
            color: #94a3b8; 
            margin-bottom: 40px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }
        
        .card-container { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            max-width: 400px; 
            margin: 0 auto; 
        }

        .badge { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            padding: 18px; 
            border-radius: 12px; 
            font-size: 0.95rem; 
            color: #e2e8f0; 
            text-align: left;
            backdrop-filter: blur(10px);
        }
        
        .company-info { 
            font-size: 0.75rem; 
            color: #64748b; 
            margin-top: 60px; 
            line-height: 1.8; 
            text-transform: uppercase; 
        }

        .contact { 
            margin-top: 30px; 
            color: #4ecca3; 
            font-size: 1rem; 
            text-decoration: none; 
            display: block; 
            font-weight: 600; 
        }

        .copyright { 
            margin-top: 40px; 
            font-size: 0.7rem; 
            color: #475569; 
            border-top: 1px solid rgba(255,255,255,0.1); 
            padding-top: 20px; 
        }
    </style>
</head>
<body>

    <div class="logo-box">
        <img src="1775665361593.png" alt="ARC Labs Logo" class="logo">
    </div>

    <br>
    <div class="status-badge">🚀 LAUNCHING SOON</div>
    
    <div class="hero-title">Propelling the Future <br>of Aerospace</div>
    <div class="tagline">Hybrid Propulsion & Decentralized Networks</div>

    <div class="card-container">
        <div class="badge">✨ Hello Tomorrow Deep Tech Pioneer 2026</div>
        <div class="badge">🏆 Viasat Space for Good Finalist 2025</div>
    </div>

    <div class="company-info">
        AJAZ RESEARCH AND DEVELOPMENT CENTRE PRIVATE LIMITED<br
    </div>

    <a href="mailto:contact@arclabs.co.in" class="contact">contact@arclabs.co.in</a>

    <div class="copyright">
        &copy; 2026 ARC Labs. All rights reserved.
    </div>

</body>
</html>
